<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon-Spec 3D & AR Product Viewer</title>

  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js">
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .product-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .model-container {
      width: 100%;
      max-width: 650px;
      height: 550px;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: radial-gradient(circle at 50% 35%, #1e1e1e 0%, #0f0f0f 72%);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    model-viewer {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      --poster-color: transparent;
      --progress-bar-color: #ff9900;
      --progress-bar-height: 0;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 153, 0, 0.08), transparent 32%),
        #111;
      opacity: 0;
      pointer-events: none;
      transition: opacity 450ms ease, visibility 450ms ease;
      visibility: hidden;
    }

    model-viewer.loading .loading-overlay {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .spinner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.16);
      border-top-color: #ff9900;
      animation: spin 900ms linear infinite;
    }

    .progress-track {
      width: min(220px, 52%);
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff9900, #ffb84d);
      transition: width 180ms ease;
    }

    .ar-button {
      position: absolute;
      right: 24px;
      bottom: 24px;
      z-index: 4;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 22px;
      border: 2px solid rgba(255, 255, 255, 0.86);
      border-radius: 100px;
      background: #fff;
      color: #111;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      transition:
        transform 180ms ease,
        background-color 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease;
    }

    .ar-button:hover {
      transform: translateY(-2px);
      background: #f7f7f2;
      border-color: #ff9900;
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.38),
        0 0 18px rgba(255, 153, 0, 0.42);
    }

    .ar-button:active {
      transform: translateY(0);
    }

    .ar-button svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 720px) {
      .model-container {
        height: min(550px, 78vh);
      }

      .ar-button {
        right: 16px;
        bottom: 16px;
        max-width: calc(100% - 32px);
        min-height: 46px;
        padding: 0 18px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="product-wrapper">
    <section class="model-container" aria-label="3D and AR product viewer">
      <model-viewer
        id="productViewer"
        class="loading"
        src="DamagedHelmet.gltf"
        alt="True-to-scale 3D product preview"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-scale="fixed"
        ar-placement="floor"
        orientation="0deg 0deg 0deg"
        tone-mapping="commerce"
        exposure="1.2"
        shadow-intensity="1.8"
        shadow-softness="0.6"
        camera-controls
        enable-pan
        auto-rotate
        auto-rotate-delay="3000"
        rotation-per-second="15deg"
        interaction-prompt-style="wiggle">

        <div slot="poster" class="loading-overlay">
          <div class="spinner" aria-hidden="true"></div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <button slot="ar-button" class="ar-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
            <path
              d="M12 2.75 20 7.25v9.5l-8 4.5-8-4.5v-9.5l8-4.5Z"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round" />
            <path
              d="M4.5 7.5 12 12l7.5-4.5M12 12v8.5"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
          <span>View in Your Room</span>
        </button>
      </model-viewer>
    </section>
  </main>

  <script>
    const viewer = document.querySelector("#productViewer");
    const progressFill = document.querySelector("#progressFill");

    viewer.addEventListener("progress", (event) => {
      const progress = Math.round(event.detail.totalProgress * 100);
      progressFill.style.width = `${progress}%`;

      if (progress >= 100) {
        viewer.classList.remove("loading");
      }
    });

    viewer.addEventListener("load", () => {
      progressFill.style.width = "100%";
      viewer.classList.remove("loading");
    });
  </script>
</body>
</html>
